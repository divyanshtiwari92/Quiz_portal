<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-red-100 min-h-screen">

  <!-- Navbar -->
  <nav class="flex justify-between items-center px-6  py-4 bg-white ">
    <h1 class="text-xl font-bold text-red-600">📕 QuizPortal</h1>
    <button id="logoutBtn" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">
      Logout
    </button>
  </nav>

  <!-- Welcome -->
  <div class="px-6 md:px-10 mt-6">
    <h2 class="text-2xl font-semibold">
      Welcome back,
      <span id="teacherName" class="text-red-600"></span>
    </h2>
    <p class="text-gray-500">Manage exams and students</p>
  </div>

  <!-- Main Grid -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-9 px-6  mt-8">

    <!-- Profile -->
    <div class="bg-white rounded-xl shadow p-6">
      <div class="text-center">
        <div class="w-20 h-20 mx-auto bg-red-500 text-white rounded-full flex items-center justify-center text-3xl">
          👩‍🏫
        </div>
        <h3 id="profileName" class="mt-4 text-xl font-semibold"></h3>
        <p id="teacherId" class="text-red-500"></p>
        <p class="text-sm mt-1">
          <span id="department"></span> • <span id="designation"></span>
        </p>
      </div>
    </div>

    <!-- Create Exam -->
    <div class=" bg-white rounded-xl ">
      <h3 class="text-lg font-semibold mb-4">+ Create New Exam</h3>

      <div class="grid grid-cols-1 gap-4">
        <input id="subject" placeholder="Subject Name" class="border rounded-lg px-4 py-2" />

        <input id="duration" type="number" placeholder="Duration (minutes)" class="border rounded-lg px-4 py-2" />

        <select id="section" class="border rounded-lg px-4 py-2">
          <option value="">Select Section</option>
          <option>Section A</option>
          <option>Section B</option>
          <option>Section C</option>
        </select>
      </div>

      <button id="createExamBtn" class="mt-4 bg-red-500 text-white px-6 py-2 rounded hover:bg-red-600">
        Create & Assign Exam
      </button>
    </div>

    <!-- Created Exams -->
    <div class=" bg-white rounded-xl  p-6">
      <h3 class="text-lg font-semibold mb-4">📝 Created Exams</h3>
      <div id="examList" class="text-gray-600 text-sm">
        No exams created yet.
      </div>
    </div>
  </div>

  <!-- Student Status -->
  <div class="px-6  mt-8">
    <div class="bg-white rounded-xl shadow p-6">
      <h3 class="text-lg font-semibold mb-4">📊 Student Exam Status</h3>
      <p class="text-gray-500 text-sm">No student attempted yet.</p>
    </div>
  </div>

  <script>

    /*  AUTH CHECK*/
    const user = JSON.parse(localStorage.getItem("user"));
    const role = localStorage.getItem("role");

    if (!user || role !== "teacher") {
      window.location.href = "index.html";
    }

    /*  PROFILE  */
    document.getElementById("teacherName").textContent = user.name;
    document.getElementById("profileName").textContent = user.name;
    document.getElementById("teacherId").textContent = user.employeeId;
    document.getElementById("department").textContent = user.department;
    document.getElementById("designation").textContent = user.designation;

  
   
   <!-- SHOW CREATED EXAMS  -->
    const examList = document.getElementById("examList");
    const savedExam = JSON.parse(localStorage.getItem("currentExam"));

    if (savedExam) {
      examList.innerHTML = `
    <div class="border p-3 rounded-lg bg-orange-50">
      <p><strong>Subject:</strong> ${savedExam.subject}</p>
      <p><strong>Duration:</strong> ${savedExam.duration} mins</p>
      <p><strong>Section:</strong> ${savedExam.section}</p>
    </div>
  `;
    }

    /* ================= LOGOUT ================= */
    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.clear();
      window.location.href = "index.html";
    });

  </script>

</body>

</html>
